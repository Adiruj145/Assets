<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ประวัติเอกสาร - KC Asset System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/@pdf-lib/fontkit/dist/fontkit.umd.min.js"></script>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../manifest.json">
</head>
<body class="bg-light">

<div id="navbar-placeholder"></div>

<div class="container py-4">
    <div class="main-card bg-white p-4 rounded shadow-sm">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0 text-primary"><i class="bi bi-clock-history"></i> ประวัติการสร้างเอกสาร</h4>
            
            <div class="input-group w-auto">
                <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                <input type="text" id="searchInput" class="form-control border-start-0" placeholder="ค้นหารายการ..." onkeyup="filterHistory()">
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle border">
                <thead class="table-light">
                    <tr>
                        <th style="width: 15%;">วัน/เวลา</th>
                        <th style="width: 15%;">ประเภท</th>
                        <th style="width: 35%;">รายการ (Log)</th>
                        <th style="width: 15%;">ผู้ทำรายการ</th>
                        <th style="width: 20%;" class="text-center">เพิ่มเติม</th> 
                    </tr>
                </thead>
                <tbody id="historyTableBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/navbar.js"></script>
<script src="../js/script.js"></script> 
<script src="../js/loading.js"></script>

<script src="../js/history.js"></script>

</body>
</html>
