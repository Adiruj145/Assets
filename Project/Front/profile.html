<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../manifest.json">
</head>
<body>

    <div id="navbar-placeholder"></div>

    <div class="container" style="max-width: 600px;">
        <div class="main-card text-center pt-5 pb-5">
            <div class="mb-4">
                <div style="width: 100px; height: 100px; background: #e9ecef; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 3rem;">
                    👤
                </div>
            </div>
            
            <h3 class="fw-bold" id="pName">-</h3>
            <p class="text-muted mb-4">KC Grande Resort & Spa</p>

            <div class="card bg-light border-0 text-start p-4 mb-4">
                <div class="row mb-2">
                    <div class="col-4 fw-bold text-secondary">Username:</div>
                    <div class="col-8" id="pUser">-</div>
                </div>
                <div class="row mb-2">
                    <div class="col-4 fw-bold text-secondary">แผนก:</div>
                    <div class="col-8"><span class="badge bg-primary" id="pDept">-</span></div>
                </div>
                <div class="row">
                    <div class="col-4 fw-bold text-secondary">สิทธิ์:</div>
                    <div class="col-8" id="pRole">-</div>
                </div>
            </div>

            <button onclick="logout()" class="btn btn-outline-danger w-100">ออกจากระบบ</button>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/navbar.js"></script> 
    <script src="../js/navbar.js"></script>
    <script src="../js/loading.js"></script> <script>
        // ดึงข้อมูลมาโชว์
        const u = checkAuth();
        document.getElementById('pName').innerText = u.username.toUpperCase();
        document.getElementById('pUser').innerText = u.username;
        document.getElementById('pDept').innerText = u.department;
        document.getElementById('pRole').innerText = u.role.toUpperCase();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
